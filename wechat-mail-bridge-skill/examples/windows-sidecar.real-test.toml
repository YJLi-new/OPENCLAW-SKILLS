sidecar_id = "winbox-real"
adapter = "uiautomation"
allow_groups = ["文件传输助手"]
watch_poll_interval_sec = 1.0

[bridge]
base_url = "http://127.0.0.1:8787"
shared_secret = "dev-bridge-secret"
auth_mode = "bearer"
request_timeout_sec = 10
claim_batch_size = 5
send_poll_interval_sec = 2
heartbeat_interval_sec = 15

[webhook_proxy]
enabled = false
host = "127.0.0.1"
port = 28761
shared_secret = "dev-bridge-secret"
inbound_secret = "local-webhook-secret"

[diagnostics]
enabled = true
host = "127.0.0.1"
port = 28762

[visual]
enabled = true
mode = "auto"
sample_interval_sec = 2
ocr_lang = "eng"
ocr_max_chars = 160
vlm_base_url = "https://api.openai.com/v1"
vlm_api_key = ""
vlm_model = "gpt-4.1-mini"
